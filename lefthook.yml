# lefthook.yml
# Git hooks configuration for Cranky

pre-commit:
  parallel: true
  commands:
    clippy:
      glob: "*.rs"
      stage_fixed: true
      run: cargo clippy --fix --allow-dirty --allow-staged --all-targets --all-features && cargo clippy --all-targets --all-features -- -D warnings

pre-push:
  parallel: false
  commands:
    build-release:
      run: cargo build --release
    test:
      run: cargo test
